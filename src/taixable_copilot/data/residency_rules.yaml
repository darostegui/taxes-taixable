# Residence day-count rules (simplified) keyed by ISO country code.
#
# Two tiers, both fail-closed:
#   1. COMPUTABLE  — a genuine quantitative ~183-day presence test exists as a
#      standalone/primary residency trigger. We model that day count, but cap
#      confidence (other statutory tests also exist) and disclose the simplification.
#   2. COVERAGE-ONLY — the primary residency test is NOT a simple day count
#      (substantial-presence, domicile, centre-of-life, etc.). We do NOT conclude
#      residency from days; we only surface the cited statutory framework. These
#      entries omit `days_threshold`; the engine flags residency_modelled=false.
#
# NOTE: Real residency tests (esp. UK SRT, US substantial-presence) are far more
# nuanced than a single day count. See data/SOURCES.md. Every entry cites a
# primary/authoritative source so the figure is verifiable, never fabricated.

# ---------------------------------------------------------------------------
# Tier 1 — COMPUTABLE day-count residency (existing UK/ES/DE unchanged)
# ---------------------------------------------------------------------------
ES:
  days_threshold: 183
  citation_id: "ES#residency-183"
  basis: "More than 183 days in the calendar year in Spanish territory (Ley 35/2006 IRPF, art. 9)."
  url: "https://www.boe.es/buscar/act.php?id=BOE-A-2006-20764"
  tax_base_scope: "worldwide"
  scope_citation_id: "ES#residency-183"
UK:
  days_threshold: 183
  citation_id: "UK#srt-183"
  basis: "Automatic UK test: 183+ days in the tax year (Statutory Residence Test, simplified)."
  url: "https://www.gov.uk/government/publications/rdr3-statutory-residence-test-srt"
  tax_base_scope: "worldwide"
  scope_citation_id: "UK#srt-183"
DE:
  days_threshold: 183
  citation_id: "DE#residency-183"
  basis: "Habitual abode / 183-day presence in Germany, Abgabenordnung §§8–9 (simplified)."
  url: "https://www.gesetze-im-internet.de/ao_1977/"
  tax_base_scope: "worldwide"
  scope_citation_id: "DE#residency-183"

